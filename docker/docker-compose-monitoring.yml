services:
  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    expose:
      - "9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - deploy
    restart: always

  loki:
    container_name: loki
    image: grafana/loki:latest
    expose:
      - "3100"
    volumes:
      - loki_data:/loki
    networks:
      - deploy
    restart: always

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - deploy
    restart: always

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  deploy:
    external: true