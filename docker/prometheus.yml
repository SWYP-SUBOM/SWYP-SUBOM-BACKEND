scrape_configs:
  - job_name: 'seobom-prod'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['seobom-backend-prod:8080']

  - job_name: 'seobom-test'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['seobom-backend-test:8080']
